<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Insights — Tenderfy</title>
<meta name="description" content="Insights and articles from Tenderfy — AI-powered tendering for construction, civil, engineering and trades across Australia and New Zealand." />
<meta name="robots" content="noindex" /><!-- canonical content lives on the WP article until cutover SEO is decided -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<meta name="theme-color" content="#1D9E75" />
</head>
<body data-page="insights">
<div id="mount-header"></div>

<main>
  <section class="page-hero article-hero">
    <img id="artHero" class="art-hero-bg" alt="" hidden />
    <span class="art-hero-scrim" aria-hidden="true"></span>
    <div class="container article-wide">
      <div class="article-hero-copy">
        <a class="art-crumb" href="insights.html">← All insights</a>
        <p class="eyebrow" id="artTag">Insights</p>
        <h1 id="artTitle">Loading article…</h1>
        <p class="article-meta article-meta-light" id="artMeta"></p>
      </div>
    </div>
  </section>

  <section class="section section-light article-body-section">
    <div class="container article-wide">
      <div class="article-layout">
        <aside class="art-toc" id="artToc" hidden>
          <div class="art-toc-title">On this page</div>
          <nav id="artTocList" aria-label="Article sections"></nav>
        </aside>
        <div class="article-main">
          <article class="article-content" id="artContent">
            <p class="art-loading">Loading…</p>
          </article>
        </div>
      </div>
    </div>
  </section>

  <section class="section section-offwhite" id="moreInsights" hidden>
    <div class="container">
      <div class="section-head">
        <p class="eyebrow eyebrow-primary">Keep reading</p>
        <h2 class="section-title">More <span class="mark">insights</span>.</h2>
      </div>
      <div class="article-grid" id="moreGrid"></div>
      <div class="article-back" style="border:0;text-align:center;">
        <a href="insights.html" class="btn btn-outline-dark">View all insights</a>
      </div>
    </div>
  </section>

  <section class="closing-cta">
    <div class="container closing-inner">
      <h2 class="closing-title">Put the insights to work.</h2>
      <p class="closing-sub">Try Tenderfy free and tender your next job the smarter way.</p>
      <div class="closing-actions">
        <a href="pricing.html" class="btn btn-secondary btn-lg">Try for Free</a>
        <a href="pricing.html" class="btn btn-outline-light btn-lg">Book a Demo</a>
      </div>
    </div>
  </section>
</main>

<div id="mount-footer"></div>
<script src="partials.js"></script>
<script src="script.js"></script>
<script src="wp-feed.js"></script>
